<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Pedidos</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#f3f4f6}
.card{box-shadow:0 10px 25px rgba(0,0,0,.08)}
</style>
</head>
<body class="min-h-screen flex justify-center p-5">

<div class="w-full max-w-4xl bg-white rounded-3xl p-6 card">

<h1 class="text-3xl font-bold text-center mb-2">Flash Pedidos</h1>
<p class="text-center text-gray-500 mb-6">Pedidos rápidos, simples e profissionais</p>

<div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
  <div>
    <label class="font-semibold block mb-2">Nº Pedido</label>
    <input id="numeroPedido" type="text" placeholder="Digite o número"
      class="w-full border rounded-xl p-3 outline-none">
  </div>

  <div>
    <label class="font-semibold block mb-2">Data</label>
    <input id="dataPedido" type="date"
      class="w-full border rounded-xl p-3 outline-none">
  </div>
</div>

<div class="mb-6">
  <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
    <div>

      <input id="codigoCliente" type="text" placeholder="Cód. do cliente"
      class="w-full border rounded-xl p-3 outline-none">
    </div>

    <div class="md:col-span-3">

      <input id="cliente" type="text" placeholder="Nome do cliente"
      class="w-full border rounded-xl p-3 outline-none">
    </div>
  </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-5 gap-3 mb-4">
  <input id="codigoProduto" type="text" placeholder="Cód. do produto"
  class="border rounded-xl p-3 outline-none">

  <input id="produto" type="text" placeholder="Descrição do produto"
  class="border rounded-xl p-3 outline-none">

  <input id="quantidade" type="number" placeholder="Qtd"
  class="border rounded-xl p-3 outline-none">

  <input id="valor" type="number" step="0.01" placeholder="Preço"
  class="border rounded-xl p-3 outline-none">

  <button onclick="adicionarProduto()"
  class="bg-blue-500 hover:bg-blue-600 text-white rounded-xl p-3 font-semibold">
  Adicionar
  </button>
</div>

<div class="overflow-auto">
<table class="w-full mb-6">
<thead>
<tr class="border-b">
<th class="text-left p-2">Cód.</th>
<th class="text-left p-2">Produto</th>
<th class="text-center p-2">Qtd</th>
<th class="text-right p-2">Preço</th>
<th class="text-right p-2">Total</th>
<th></th>
</tr>
</thead>
<tbody id="tabelaPedidos"></tbody>
</table>
</div>

<div class="flex justify-end mb-6">
<div class="bg-gray-100 rounded-2xl px-6 py-4">
<p class="text-gray-500 text-sm">Total do Pedido</p>
<h2 id="totalPedido" class="text-3xl font-bold">R$ 0,00</h2>
</div>
</div>

<div class="mb-6">
<label class="font-semibold block mb-2">Observações</label>
<textarea id="observacoes" rows="4"
placeholder="Digite observações do pedido"
class="w-full border rounded-xl p-3 outline-none"></textarea>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-3">

  <button
    onclick="novoPedido()"
    class="bg-red-500 hover:bg-red-600 text-white p-4 rounded-2xl font-bold"
  >
    🗑 Novo Pedido
  </button>

  <button
    onclick="compartilharWhatsApp()"
    class="bg-green-500 hover:bg-green-600 text-white p-4 rounded-2xl font-bold"
  >
    Compartilhar WhatsApp
  </button>

  <button
    onclick="gerarPDF()"
    class="bg-gray-800 hover:bg-gray-900 text-white p-4 rounded-2xl font-bold"
  >
    Gerar PDF
  </button>

</div>

<script>
let pedidos = [];

function carregarDados() {

  const dadosSalvos =
    localStorage.getItem("flashPedidos");

  if (!dadosSalvos) return;

  const dados = JSON.parse(dadosSalvos);

  pedidos = dados.pedidos || [];

  document.getElementById("numeroPedido").value =
    dados.numeroPedido || "";

  document.getElementById("dataPedido").value =
    dados.dataPedido || "";

  document.getElementById("codigoCliente").value =
    dados.codigoCliente || "";

  document.getElementById("cliente").value =
    dados.cliente || "";

  document.getElementById("observacoes").value =
    dados.observacoes || "";

  atualizarTabela();
}

function salvarDados() {

  const dados = {
    pedidos,
    numeroPedido: document.getElementById("numeroPedido").value,
    dataPedido: document.getElementById("dataPedido").value,
    codigoCliente: document.getElementById("codigoCliente").value,
    cliente: document.getElementById("cliente").value,
    observacoes: document.getElementById("observacoes").value
  };

  localStorage.setItem(
    "flashPedidos",
    JSON.stringify(dados)
  );
}

function adicionarProduto() {
  const codigoProduto = document.getElementById("codigoProduto").value;
  const produto = document.getElementById("produto").value;
  const quantidade = parseFloat(document.getElementById("quantidade").value);
  const valor = parseFloat(document.getElementById("valor").value);

  if (!produto || !quantidade || !valor) {
    alert("Preencha todos os campos.");
    return;
  }

  pedidos.push({
    codigoProduto,
    produto,
    quantidade,
    valor,
    total: quantidade * valor
  });

  atualizarTabela();
  salvarDados();

  document.getElementById("codigoProduto").value = "";
  document.getElementById("produto").value = "";
  document.getElementById("quantidade").value = "";
  document.getElementById("valor").value = "";
}

function atualizarTabela() {
  const tabela = document.getElementById("tabelaPedidos");
  tabela.innerHTML = "";

  let totalPedido = 0;

pedidos.forEach((item, index) => {

  totalPedido += item.total;

  const valorFormatado = item.total.toLocaleString('pt-BR', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });

  tabela.innerHTML += `
    <tr class="border-b">
      <td class="p-2">${item.codigoProduto}</td>
      <td class="p-2">${item.produto}</td>
      <td class="p-2 text-center">${item.quantidade}</td>
      <td class="p-2 text-right">R$ ${valorFormatado}</td>
    </tr>
  `;

});

  document.getElementById("totalPedido").innerText =
    `R$ ${totalPedido.toFixed(2)}`;
}

function removerProduto(index) {
    if (!confirm("Deseja excluir este item?")) {
    return;
  }
  pedidos.splice(index, 1);
  atualizarTabela();
  salvarDados();
}

function compartilharWhatsApp() {
  const numeroPedido = document.getElementById("numeroPedido").value;
  const dataPedido = document.getElementById("dataPedido").value;
  const codigoCliente = document.getElementById("codigoCliente").value;
  const cliente = document.getElementById("cliente").value;
  const observacoes = document.getElementById("observacoes").value;

  let mensagem = `*Solicitação de Pedido*%0A%0A`;
  mensagem += `Pedido: ${numeroPedido}%0A`;
  mensagem += `Data: ${dataPedido}%0A`;
  mensagem += `Cliente: ${cliente}%0A`;
  mensagem += `Código Cliente: ${codigoCliente}%0A%0A`;

  pedidos.forEach(item => {
    mensagem += `${item.codigoProduto} - ${item.produto}`;
    mensagem += ` (${item.quantidade}x)`;
    mensagem += ` - R$ ${item.total.toFixed(2)}%0A`;
  });

  const total = pedidos.reduce((acc, item) => acc + item.total, 0);

  mensagem += `%0AObservações:%0A${observacoes}%0A`;
  mensagem += `%0A*Total:* R$ ${total.toFixed(2)}`;

  window.open(`https://wa.me/?text=${mensagem}`, "_blank");
}

async function gerarPDF() {

  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF();

  const numeroPedido =
    document.getElementById("numeroPedido").value;

  const dataOriginal =
document.getElementById("dataPedido").value;

const dataPedido =
dataOriginal.split("-").reverse().join("/");

  const codigoCliente =
    document.getElementById("codigoCliente").value;

  const cliente =
    document.getElementById("cliente").value;

  const observacoes =
    document.getElementById("observacoes").value;

  pdf.setFontSize(18);
  pdf.text("FLASH PEDIDOS", 20, 20);

  pdf.setFontSize(11);

  pdf.text(`Pedido: ${numeroPedido}`, 20, 35);
  pdf.text(`Data: ${dataPedido}`, 20, 42);

  pdf.text(
    `Cliente: ${codigoCliente} - ${cliente}`,
    20,
    50
  );
  pdf.line(20, 55, 190, 55);

  let linha = 70;

  pdf.text("Código", 20, linha);
  pdf.text("Produto", 50, linha);
  pdf.text("Qtd", 130, linha);
  pdf.text("Total", 160, linha);

  linha += 8;

  let totalPedido = 0;

  pedidos.forEach(item => {

    pdf.text(
      item.codigoProduto || "",
      20,
      linha
    );

    pdf.text(
      item.produto,
      50,
      linha
    );

    pdf.text(
      String(item.quantidade),
      130,
      linha
    );

    pdf.text(
      `R$ ${item.total.toLocaleString('pt-BR', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })}`,
      160,
      linha
    );

    totalPedido += item.total;

    linha += 8;
  });
  // Linha separadora antes do total
pdf.line(20, linha, 190, linha);

linha += 10;

pdf.setFontSize(12);

pdf.setFontSize(14);

pdf.text(
  `TOTAL DO PEDIDO: R$ ${totalPedido.toLocaleString('pt-BR', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  })}`,
  20,
  linha
);

  linha += 15;

  pdf.setFontSize(12);

pdf.text(
  "Observações",
  20,
  linha
);

linha += 5;

// Caixa de observações
pdf.rect(20, linha, 170, 30);

pdf.setFontSize(10);

pdf.text(
  observacoes || "Sem observações",
  25,
  linha + 10
);

  pdf.save(
    `Pedido_${numeroPedido || "SemNumero"}.pdf`
  );

function novoPedido() {

  if (!confirm("Deseja iniciar um novo pedido?")) {
    return;
  }

  localStorage.removeItem("flashPedidos");

  pedidos = [];

  document.getElementById("numeroPedido").value = "";
  document.getElementById("codigoCliente").value = "";
  document.getElementById("cliente").value = "";
  document.getElementById("observacoes").value = "";

  atualizarTabela();

  location.reload();

}

window.onload = () => {

  const hoje = new Date();

  const dia =
    String(hoje.getDate()).padStart(2, "0"); 

  const mes =
    String(hoje.getMonth() + 1).padStart(2, "0");

  const ano = hoje.getFullYear();

  // Só define a data se não existir pedido salvo
  if (!localStorage.getItem("flashPedidos")) {

    document.getElementById("dataPedido").value =
      `${ano}-${mes}-${dia}`;

  }

  carregarDados();

  document
    .querySelectorAll("input, textarea")
    .forEach(campo => {

      campo.addEventListener(
        "input",
        salvarDados
      );

    });

};
if ("serviceWorker" in navigator) {
  navigator.serviceWorker
    .register("service-worker.js")
    .then(() => {
      console.log("Service Worker registrado");
    });
}
</script>

</body>
</html>
